<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>KCMH DBT Research</title>

<style>
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:#eef7f3;
  color:#2f4f4f;
}

header{
  text-align:center;
  padding:25px;
  background:#dff3ea;
}

.container{
  max-width:900px;
  margin:auto;
  padding:30px;
}

.module{
  padding:25px;
  border-radius:16px;
  margin-bottom:25px;
  box-shadow:0 6px 18px rgba(0,0,0,0.06);
}

.mindfulness{ background:#e8f4ef; }
.emotion{ background:#e6f3f3; }
.distress{ background:#f3efe6; }
.interpersonal{ background:#efe9f4; }

.video-block{
  margin-top:15px;
}

/* Optional: Make video responsive */
.video-wrapper {
  position: relative;
  padding-bottom: 56.25%; /* 16:9 ratio */
  height: 0;
}

.video-wrapper iframe {
  position: absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
  border-radius:12px;
}
</style>
</head>

<body>

<header>
  <h2>KCMH DBT Research</h2>
</header>

<div class="container">

  <!-- MINDFULNESS MODULE -->
  <div class="module mindfulness">
    <h3>🧘 Mindfulness</h3>
    <div class="video-block">
      <strong>Mindfulness Practice</strong>

      <div class="video-wrapper">
        <iframe
          src="https://www.youtube.com/embed/Qs3H1GEg2o0?rel=0&modestbranding=1&iv_load_policy=3"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen>
        </iframe>
      </div>

    </div>
  </div>

  <!-- EMOTION REGULATION -->
  <div class="module emotion">
    <h3>🌿 Emotion Regulation</h3>
    <p>Content coming soon.</p>
  </div>

  <!-- DISTRESS TOLERANCE -->
  <div class="module distress">
    <h3>🪨 Distress Tolerance</h3>
    <p>Content coming soon.</p>
  </div>

  <!-- INTERPERSONAL EFFECTIVENESS -->
  <div class="module interpersonal">
    <h3>🤝 Interpersonal Effectiveness</h3>
    <p>Content coming soon.</p>
  </div>

</div>

</body>
</html>
